<!DOCTYPE html>
<html>
<head>
  <title>Timetable</title>
  <style>
    table {
      width: 80%;
      border-collapse: collapse;
      text-align: center;
    }
    th, td {
      border: 1px solid black;
      padding: 10px;
    }
    th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>
  <h2>Weekly Timetable</h2>
  <table>
    <tr>
      <th>Day</th>
      <th>9:00 - 10:00</th>
      <th>10:00 - 11:00</th>
      <th>11:00 - 12:00</th>
      <th>1:00 - 2:00</th>
    </tr>
    <tr>
      <td>Monday</td>
      <td>Math</td>
      <td>Physics</td>
      <td>Chemistry</td>
      <td>English</td>
    </tr>
    <tr>
      <td>Tuesday</td>
      <td colspan="4">Biology</td>
      
    </tr>
    <tr>
      <td>Wednesday</td>
      <td>English</td>
      <td>Physics</td>
      <td>Chemistry</td>
      <td>Sports</td>
    </tr>
    <tr>
      <td>Thursday</td>
      <td>CS</td>
      <td>Math</td>
      <td>Biology</td>
      <td>Free</td>
    </tr>
    <tr>
      <td>Friday</td>
      <td>Chemistry</td>
      <td>English</td>
      <td>Physics</td>
      <td>Math</td>
    </tr>
  </table>
</body>
</html>
