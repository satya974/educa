<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="gen.css">
   
    
</head>
<body>
    <div class="gen">
        <h1>Generate a<br><span>PASSWORD</span></h1>
        <div class="child">
            <input type="text" id="password" placeholder="password">
        </div>
        <button onclick="createPass()">Generate password</button>
        <button onclick="copyPass()">copy Password</button>
    </div>
    <script>
        const passwordBox = document.getElementById("password");
        const length = 6;
        const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lower = "abcdefghijklmnopqrstuvwxyz";
        const number = "0123456789";
        const sym = "~!@#$%^&*(){}";
        const allchars = upper + lower + number + sym;
    
        function shuffle(str) {
            return str.split('').sort(() => 0.5 - Math.random()).join('');
        }
    
        function createPass() {
            let password = "";
            password += upper[Math.floor(Math.random() * upper.length)];
            password += lower[Math.floor(Math.random() * lower.length)];
            password += number[Math.floor(Math.random() * number.length)];
            password += sym[Math.floor(Math.random() * sym.length)];
    
            for (let i = password.length; i < length; i++) {
                password += allchars[Math.floor(Math.random() * allchars.length)];
            }
    
            passwordBox.value = shuffle(password);
        }
        function copyPass(){
            if(passwordBox.value!==""){
                passwordBox.select();
                document.execCommand("copy");
                alert("password copied");
            }
            else{
                alert("enter the password");
            }
        }
    </script>
</body>
</html>
