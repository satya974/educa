<!DOCTYPE html>
<html>
<head>
  <script>
    function showPrimes() {
      let limit = parseInt(document.getElementById("primeNum").value);
      let primes = [];
      for (let i = 2; i <= limit; i++) {
        let isPrime = true;
        for (let j = 2; j <= Math.sqrt(i); j++) {
          if (i % j === 0) {
            isPrime = false;
            break;
          }
        }
        if (isPrime) primes.push(i);
      }
      document.getElementById("output").innerText = primes.join(", ");
    }
  </script>
</head>
<body>
  Enter Limit: <input type="number" id="primeNum">
  <button onclick="showPrimes()">Prime</button>
  <p id="output"></p>
</body>
</html>
