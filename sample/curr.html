<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <input type="number" id="currency">
    <button onclick="getdenom()">denom</button>
    <div id="result"></div>
    <button onclick="change" id="chang">taxt change</button>
    <script>
        function getdenom(){
            let n=parseInt(document.getElementById("currency").value);
            let denominations=[2000,500,200,100,50,20,10,5];
            let res="";
            for(let note of denominations){
                let count=Math.floor(n/note);
                if(count>0){
                    res+=`${note}*${count}=${note*count}<br>`;
                    n%=note;
                }
                document.getElementById("result").innerText=res;
        
           }
        }
