<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function fib(){
            let n=parseInt(document.getElementById("fibonaci").value);
            let a=0,b=1,res=[];
            while(a<=n){
                res.push(a);
                [a,b]=[b,a+b];
            }
            document.getElementById("result").innerText=res.join(",");
        }
    </script>
</head>
<body>
    <input type="number" id="fibonaci">
    <button onclick="fib()">fibbonaci</button>
    <p id="result"></p>
</body>
</html>
