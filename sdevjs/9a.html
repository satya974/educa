<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button class="js-button">9a</button>
    <button class="js-but2" onclick="but()">9b</button>
    <script>
        console.log(document.querySelector('.js-button'));
        function but(){
            const ButtonElement=document.querySelector('.js-but2');
            if(ButtonElement.innerText='9b'){
                ButtonElement.innerHTML='9b done!';
            }
            else{
                ButtonElement.innerHTML='9b';
            }
        }
    </script>
</body>
</html>
