<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input placeholder="enter here" class="js-input" onkeydown="handleKey(event)">
    <button onclick="submit();" class="js-button">Submit</button>
    <p class="js-para"></p>
    <script>
        function handleKey(event){
            if(event.key==='Enter'){
                submit();
            }
        }
        function submit(){
            const inputElement=document.querySelector('.js-input');
            document.querySelector('.js-para').innerHTML=`your name: ${inputElement.value}`;
        }
    </script>
</body>
</html>
