<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const nums=[1,1,3];
        let total=0;
        for(let i=0;i<nums.length;i++){
            const num=nums[i];
            total+=num;
        }
        console.log(total);
        const copy=[];
        for(let j=0;j<nums.length;j++){
            const num=nums[j];
            copy.push(num*2);
        }
        console.log(copy);
    </script>
</body>
</html>
